<!--category_list.html-->
{% extends 'catalog/base.html' %}
{% load my_tags %}
{% block title %} Список категорий товаров {% endblock title %}
{% block content %}

<body>
<div class="container">
    <div class="row text-center">
        {% for category in object_list %}
        <div class="col-4">
            <div class="card mb-4 box-shadow">
                <div class="card-header">

                    <h4 class="my-0 font-weight-normal">{{ category.name }}</h4>
                    <p class="card-text">{{ category.description }}</p>
                    <a href="{% url 'catalog:product_category_list' category.id %}" class="btn btn-primary">Посмотреть товары</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

</body>
{% endblock content %}
